name: Automated Model Retraining

on:
  schedule:
    - cron: '0 0 1 * *' # Run at midnight on the 1st of every month
  workflow_dispatch: # Allow manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn catboost lightgbm joblib pydantic

      - name: Execute Training Pipeline
        run: |
          python pipeline/farm_recommender_elite_v11.py --production

      - name: Commit Updated Weights
        run: |
          git config --global user.name "Retraining-Bot"
          git config --global user.email "bot@okechanalytics.com"
          git lfs install
          git add models_v11_voting/*.pkl
          git commit -m "Auto-retrain: Update High-Precision Ensemble weights [$(date +'%Y-%m-%d')]" || echo "No changes to commit"
          git push origin main
